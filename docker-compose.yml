services:
  uptime-notifier:
    build: .
    container_name: uptime-notifier
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - SECRET_KEY=${SECRET_KEY:-uptime-notifier-secret}
    volumes:
      - ./channels.json:/app/channels.json
    networks:
      - uptime-net

networks:
  uptime-net:
    name: uptime-net
    external: true
